    lag: 1
    kjede_terminologi:
      odontia: ["Tannfarget fylling, ekstra stor"]
      colosseum: []
      oc: ["Fylling 4 flater eller mer"]
      oris: []

  - id: crown
    navn: "Krone"
    lag: 1
    kjede_terminologi:
