# Canonical treatment IDs for cross-chain price comparison.
# Manually curated. Update by reviewing data/treatments_observed.yaml after
# each scrape and adding kjede-specific synonyms or new canonical entries.
#
# Schema:
#   meta:        version, last-updated, scope
#   canonical:   {id, navn, lag, kjede_terminologi: {kjede: [synonyms]}}
#   ikke_kanonisk_men_scrapes: behandlinger that are intentionally captured
#     as `prisformat ∈ {per_dose, per_stk, per_halvtime}` add-ons rather than
#     normalised into a comparable canonical row.

meta:
  versjon: 2
  sist_oppdatert: 2026-05-06
  scope: "kurven for prissammenligning fase 1"
  ikke_kanonisk_men_scrapes:
    - "Forbruksvarer (per_stk tillegg)"
    - "Oppdekking og engangsutstyr"
    # Out-of-scope treatments — real, but outside fase-1 prissammenligning basket
    - "Aligner behandling"
    - "Vivera retensjonsskinner"
    - "Snorkeskinne"
    - "Pasientfoto"
    - "Resept"
    - "Premedikasjon"
    - "Bleketube"
    - "Blekestrips"
    - "Blekeskinner begge kjever"
    - "Blekeskinne (inkludert blekemiddel, en kjeve)"
    - "Blekebehandling"
    - "Akutt rotbehandling"
    - "Hygienetillegg"
    - "Hygienetillegg (når ikke inkl. i stykkpris)"
    - "Hygienetillegg allmennbehandling"
    - "Ikke-møtt gebyr"
    - "Konsultasjonusynlig tannregulering"  # Colosseum parser artifact
    - "Førstekonsultasjontannregulering"    # ortho first consult, separate specialty
    - "Konsultasjon for akutt"
    - "Tannkjøttbehandling"
    # Specialty / orthodontics — outside fase-1
    - "Kjeveortoped forundersøkelse"
    - "Konsultasjon hos spes"
    - "Undersøkelse student"
    - "Undersøkelse hos spesialist, priser fra"
    - "Min Tannhelsestatus"  # Oris-specific premium variant of annual_checkup
    # Bridges / multi-component — outside fase-1 prissammenligning basket
    - "3-leddsbro på to implantat:"
    - "Broledd"
    - "Mellomledd metallfri ved broarbeid (som ikke er på implantat)"
    - "Mellomledd MK ved broarbeid (som ikke er på implantat)"
    - "Treledds bro metallfri (erstatte en tann) inkl 1 bedøvelse"
    - "Treledds bro MK (erstatte en tann)"
    - "2 implantat og implantatkroner"
    # Add-ons / preparation — not standalone treatments
    - "Kirurgisk oppdekking"
    - "Tillegg for eventuell stål i protese (ved behov)"
    - "Midlertidig fylling"
    - "Midlertidig delprotese 1-2 tenner"
    - "Midlertidig delprotese 3-5 tenner"
    - "Midlertidig delprotese 6-14 tenner"
    - "Rebasering (oppføring protese) tannteknikk"
    - "Retensjonsstreng"
    - "Perioundersøkelse med lommeregistrering"
    - "Støpt fylling (gull/porselen) inkl. tannteknikk"
    # Anatomical labels appearing as standalone rows in OC's price table —
    # tooth-type tags rather than treatments per se
    - "Fortann"
    - "Fortann og hjørnetann"
    - "Fortann og liten jeksel"
    - "Liten jeksel"
    - "Stor jeksel"
    - "Stor Jeksel"
    # Oris row-headers leaking through the parser
    - "Ved behandling"
    - "Ved kirurgi"
    - "Ved konsultasjon / kontroll"

canonical:
  - id: annual_checkup
    navn: "Årlig kontroll"
    lag: 1
    kjede_terminologi:
      odontia: ["Årlig kontroll hos tannlege", "Årlig kontroll hos tannpleier"]
      colosseum: ["Undersøkelse"]
      oc: ["Tannundersøkelse hos tannlege", "Tannundersøkelse", "Tannundersøkelse hos tannpleier"]
      oris: ["Tannundersøkelse"]

  - id: tooth_cleaning
    navn: "Tannrens"
    lag: 1
    kjede_terminologi:
      odontia: ["Tannrens med airflow", "Tannrens", "Tannrens med pussepasta"]
      colosseum: ["Tannrens"]
      oc: ["Tannrens"]
      oris: []

  - id: composite_filling_one_surface
    navn: "Tannfarget fylling, én tannflate"
    lag: 1
    kjede_terminologi:
      odontia: ["Tannfarget fylling, liten"]
      colosseum: ["Fyllinger, én tannflate (kompositt)"]
      oc: ["Fylling 1 flate"]
      oris: ["Fyllinger, én tannflate (kompositt)"]

  - id: composite_filling_two_surfaces
    navn: "Tannfarget fylling, to tannflater"
    lag: 1
    kjede_terminologi:
      odontia: ["Tannfarget fylling, medium"]
      colosseum: ["Fyllinger, to tannflater (kompositt)"]
      oc: ["Fylling 2 flater"]
      oris: ["Fyllinger, to tannflater (kompositt)"]

  - id: composite_filling_three_surfaces
    navn: "Tannfarget fylling, tre tannflater"
    lag: 1
    kjede_terminologi:
      odontia: ["Tannfarget fylling, stor"]
      colosseum: ["Fyllinger, tre tannflater (kompositt)"]
