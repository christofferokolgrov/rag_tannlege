#
# Discovery method: WebSearch per AS-name + manual review of top results.
# Confidence ratings:
#   high   — exact name match in domain or page title; clearly the right clinic
#   medium — plausible match; minor name divergence (e.g. AS-name ≠ trading name)
#   low    — ambiguous; might be wrong clinic or non-clinic site
#   none   — no clear match found; clinic excluded from scrape
#
# Each entry has prisliste_url where the clinic publishes prices, separate
# from the main URL when available.

